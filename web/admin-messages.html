<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>留言管理 · 澄明志愿</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f6f1e7; color: #17223b; }
  main { max-width: 1100px; margin: 0 auto; padding: 32px 18px 60px; }
  header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
  h1 { font-size: 24px; margin: 0; font-family: Georgia, "Noto Serif SC", serif; letter-spacing: 2px; }
  a { color: #a8823c; text-decoration: none; }
  nav { display: flex; gap: 16px; flex-wrap: wrap; }
  section { background: #fffdf7; border: 1px solid rgba(23,34,59,.18); padding: 22px; margin-bottom: 18px; }
  h2 { font-size: 17px; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: #5f6472; margin-bottom: 7px; }
  input { width: 100%; padding: 11px 12px; border: 1px solid rgba(23,34,59,.25); border-radius: 2px; background: #fff; color: #17223b; font: inherit; }
  button { border: 1px solid #17223b; background: #17223b; color: #f6f1e7; padding: 11px 18px; cursor: pointer; font: inherit; }
  button.secondary { background: transparent; color: #17223b; }
  .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .msg { min-height: 20px; margin-top: 12px; font-size: 13px; color: #7a5b19; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 8px; border-bottom: 1px solid rgba(23,34,59,.12); text-align: left; vertical-align: top; }
  th { color: #5f6472; font-weight: 600; white-space: nowrap; }
  .message-cell { min-width: 280px; line-height: 1.7; white-space: pre-wrap; }
  .muted { color: #6e6754; }
  .badge { display: inline-block; border: 1px solid rgba(168,130,60,.42); color: #a8823c; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
  @media (max-width: 760px) {
    header { align-items: flex-start; flex-direction: column; }
    section { padding: 18px; }
    table { min-width: 860px; }
  }
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>留言管理</h1>
      <div class="muted" style="font-size:13px;margin-top:6px;">查看“关于我们”页面提交的留言，管理员口令来自服务器环境变量 ADMIN_TOKEN。</div>
    </div>
    <nav>
      <a href="admin-invites.html">邀请码管理</a>
      <a href="index.html">返回首页</a>
    </nav>
  </header>

  <section>
    <h2>管理员口令</h2>
    <label>ADMIN_TOKEN</label>
    <input id="adminToken" type="password" placeholder="输入管理员口令">
    <div class="actions">
      <button type="button" id="saveToken">保存到本机浏览器</button>
      <button type="button" class="secondary" id="loadMessages">刷新留言</button>
    </div>
    <div class="msg" id="tokenMsg"></div>
  </section>

  <section>
    <h2>最近留言</h2>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>称呼</th>
            <th>邮箱</th>
            <th>留言内容</th>
            <th>IP</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="messagesBody">
          <tr><td colspan="6">尚未加载</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<script>
(function () {
  var tokenInput = document.getElementById('adminToken');
  var tokenMsg = document.getElementById('tokenMsg');
  var messagesBody = document.getElementById('messagesBody');
  tokenInput.value = localStorage.getItem('gaokaoAdminToken') || '';

  function token() { return tokenInput.value.trim(); }
  function fmt(s) { return s ? new Date(s).toLocaleString('zh-CN') : '-'; }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  document.getElementById('saveToken').addEventListener('click', function () {
    localStorage.setItem('gaokaoAdminToken', token());
    tokenMsg.textContent = '已保存。';
  });

  document.getElementById('loadMessages').addEventListener('click', loadMessages);

  function loadMessages() {
    messagesBody.innerHTML = '<tr><td colspan="6">加载中...</td></tr>';
    fetch('/api/admin/messages', { headers: { 'X-Admin-Token': token() } })
      .then(function (resp) {
        return resp.json().then(function (body) {
          if (!resp.ok) throw new Error(body.error || '读取失败');
          var rows = body.messages || [];
          if (!rows.length) {
            messagesBody.innerHTML = '<tr><td colspan="6">暂无留言</td></tr>';
            return;
          }
          messagesBody.innerHTML = rows.map(function (r) {
            var email = escapeHtml(r.email || '');
            return '<tr>' +
              '<td class="muted">' + escapeHtml(fmt(r.createdAt)) + '</td>' +
              '<td>' + escapeHtml(r.name || '-') + '</td>' +
              '<td><a href="mailto:' + email + '">' + email + '</a></td>' +
              '<td class="message-cell">' + escapeHtml(r.message || '-') + '</td>' +
              '<td class="muted">' + escapeHtml(r.ip || '-') + '</td>' +
              '<td><span class="badge">' + escapeHtml(r.status || '-') + '</span></td>' +
            '</tr>';
          }).join('');
        });
      }).catch(function (err) {
        messagesBody.innerHTML = '<tr><td colspan="6">' + escapeHtml(err.message || '读取失败') + '</td></tr>';
      });
  }
})();
</script>
</body>
</html>
