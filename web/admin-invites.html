<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>邀请码管理 · 澄明志愿</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f6f1e7; color: #17223b; }
  main { max-width: 920px; margin: 0 auto; padding: 32px 18px 60px; }
  header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
  h1 { font-size: 24px; margin: 0; font-family: Georgia, "Noto Serif SC", serif; letter-spacing: 2px; }
  a { color: #a8823c; text-decoration: none; }
  section { background: #fffdf7; border: 1px solid rgba(23,34,59,.18); padding: 22px; margin-bottom: 18px; }
  h2 { font-size: 17px; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: #5f6472; margin-bottom: 7px; }
  input, textarea { width: 100%; padding: 11px 12px; border: 1px solid rgba(23,34,59,.25); border-radius: 2px; background: #fff; color: #17223b; font: inherit; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .full { grid-column: 1 / -1; }
  button { border: 1px solid #17223b; background: #17223b; color: #f6f1e7; padding: 11px 18px; cursor: pointer; font: inherit; }
  button.secondary { background: transparent; color: #17223b; }
  .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .msg { min-height: 20px; margin-top: 12px; font-size: 13px; color: #7a5b19; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 8px; border-bottom: 1px solid rgba(23,34,59,.12); text-align: left; vertical-align: top; }
  th { color: #5f6472; font-weight: 600; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #a8823c; font-weight: 700; }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } header { align-items: flex-start; flex-direction: column; } }
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>邀请码管理</h1>
      <div style="font-size:13px;color:#6e6754;margin-top:6px;">生成报告前置邀请码；管理员口令来自服务器环境变量 ADMIN_TOKEN。</div>
    </div>
    <nav style="display:flex; gap:16px; flex-wrap:wrap;">
      <a href="admin-messages.html">留言管理</a>
      <a href="index.html">返回首页</a>
    </nav>
  </header>

  <section>
    <h2>管理员口令</h2>
    <div class="grid">
      <div class="full">
        <label>ADMIN_TOKEN</label>
        <input id="adminToken" type="password" placeholder="输入管理员口令">
      </div>
    </div>
    <div class="actions">
      <button type="button" id="saveToken">保存到本机浏览器</button>
      <button type="button" class="secondary" id="loadCodes">刷新邀请码</button>
    </div>
    <div class="msg" id="tokenMsg"></div>
  </section>

  <section>
    <h2>生成邀请码</h2>
    <form id="inviteForm">
      <div class="grid">
        <div>
          <label>指定邀请码（可选）</label>
          <input name="code" placeholder="留空则自动生成">
        </div>
        <div>
          <label>可用次数</label>
          <input name="maxUses" type="number" min="1" value="1">
        </div>
        <div>
          <label>过期时间（默认 7 天后）</label>
          <input name="expiresAt" type="datetime-local">
        </div>
        <div>
          <label>备注</label>
          <input name="note" placeholder="如 7月线下咨询">
        </div>
      </div>
      <div class="actions">
        <button type="submit">生成邀请码</button>
      </div>
      <div class="msg" id="formMsg"></div>
    </form>
  </section>

  <section>
    <h2>最近邀请码</h2>
    <h3 style="font-size:14px;margin:8px 0 10px;color:#5f6472;">未使用</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>邀请码</th><th>使用</th><th>过期</th><th>备注</th><th>创建时间</th></tr>
        </thead>
        <tbody id="unusedCodesBody">
          <tr><td colspan="5">尚未加载</td></tr>
        </tbody>
      </table>
    </div>
    <h3 style="font-size:14px;margin:22px 0 10px;color:#5f6472;">已使用</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>邀请码</th><th>使用</th><th>过期</th><th>备注</th><th>创建时间</th></tr>
        </thead>
        <tbody id="usedCodesBody">
          <tr><td colspan="5">尚未加载</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<script>
(function () {
  var tokenInput = document.getElementById('adminToken');
  var tokenMsg = document.getElementById('tokenMsg');
  var formMsg = document.getElementById('formMsg');
  var unusedCodesBody = document.getElementById('unusedCodesBody');
  var usedCodesBody = document.getElementById('usedCodesBody');
  var expiresAtInput = document.querySelector('input[name="expiresAt"]');
  tokenInput.value = localStorage.getItem('gaokaoAdminToken') || '';

  function token() { return tokenInput.value.trim(); }
  function headers() { return { 'Content-Type': 'application/json', 'X-Admin-Token': token() }; }
  function fmt(s) { return s ? new Date(s).toLocaleString('zh-CN') : '-'; }
  function isExpired(r) { return !!(r.expiresAt && new Date(r.expiresAt).getTime() < Date.now()); }
  // 过期/停用的码不能再使用，但仍按用量分组展示；在过期列里红字标注状态
  function expiryCell(r) {
    if (r.disabledAt) return '<span style="color:#a8442e;">已停用</span>';
    if (isExpired(r)) return '<span style="color:#a8442e;">已过期 · ' + escapeHtml(fmt(r.expiresAt)) + '</span>';
    return escapeHtml(fmt(r.expiresAt));
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function formatDatetimeLocal(date) {
    return date.getFullYear() + '-' +
      pad(date.getMonth() + 1) + '-' +
      pad(date.getDate()) + 'T' +
      pad(date.getHours()) + ':' +
      pad(date.getMinutes());
  }
  function setDefaultExpiry() {
    var expires = new Date();
    expires.setDate(expires.getDate() + 7);
    expires.setHours(23, 59, 0, 0);
    var value = formatDatetimeLocal(expires);
    expiresAtInput.defaultValue = value;
    expiresAtInput.value = value;
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  setDefaultExpiry();

  document.getElementById('saveToken').addEventListener('click', function () {
    localStorage.setItem('gaokaoAdminToken', token());
    tokenMsg.textContent = '已保存。';
  });

  document.getElementById('loadCodes').addEventListener('click', loadCodes);

  document.getElementById('inviteForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var form = e.currentTarget;
    var data = new FormData(form);
    var payload = {
      code: String(data.get('code') || '').trim(),
      maxUses: Number(data.get('maxUses') || 1),
      expiresAt: data.get('expiresAt') ? new Date(data.get('expiresAt')).toISOString() : null,
      note: String(data.get('note') || '').trim()
    };
    formMsg.textContent = '正在生成...';
    fetch('/api/admin/invite-codes', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify(payload)
    }).then(function (resp) {
      return resp.json().then(function (body) {
        if (!resp.ok) throw new Error(body.error || '生成失败');
        formMsg.innerHTML = '已生成：<code>' + escapeHtml(body.inviteCode.code) + '</code>';
        form.reset();
        setDefaultExpiry();
        loadCodes();
      });
    }).catch(function (err) {
      formMsg.textContent = err.message || '生成失败';
    });
  });

  function loadCodes() {
    unusedCodesBody.innerHTML = '<tr><td colspan="5">加载中...</td></tr>';
    usedCodesBody.innerHTML = '<tr><td colspan="5">加载中...</td></tr>';
    fetch('/api/admin/invite-codes', { headers: { 'X-Admin-Token': token() } })
      .then(function (resp) {
        return resp.json().then(function (body) {
          if (!resp.ok) throw new Error(body.error || '读取失败');
          var rows = body.inviteCodes || [];
          var unusedRows = rows.filter(function (r) { return r.usedCount < r.maxUses; });
          var usedRows = rows.filter(function (r) { return r.usedCount >= r.maxUses; });
          unusedCodesBody.innerHTML = renderInviteRows(unusedRows, '暂无未使用邀请码');
          usedCodesBody.innerHTML = renderInviteRows(usedRows, '暂无已使用邀请码');
        });
      }).catch(function (err) {
        var message = '<tr><td colspan="5">' + escapeHtml(err.message || '读取失败') + '</td></tr>';
        unusedCodesBody.innerHTML = message;
        usedCodesBody.innerHTML = message;
      });
  }

  function renderInviteRows(rows, emptyText) {
    if (!rows.length) {
      return '<tr><td colspan="5">' + escapeHtml(emptyText) + '</td></tr>';
    }
    return rows.map(function (r) {
      return '<tr>' +
        '<td><code>' + escapeHtml(r.code) + '</code></td>' +
        '<td>' + r.usedCount + ' / ' + r.maxUses + '</td>' +
        '<td>' + expiryCell(r) + '</td>' +
        '<td>' + escapeHtml(r.note || '-') + '</td>' +
        '<td>' + escapeHtml(fmt(r.createdAt)) + '</td>' +
      '</tr>';
    }).join('');
  }
})();
</script>
</body>
</html>
